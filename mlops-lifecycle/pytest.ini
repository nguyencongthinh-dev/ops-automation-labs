[pytest]
# Suppress known third-party deprecation warnings that are not in our control.
# These come from mlflow (PydanticV1 validator patterns), evidently (scipy.linalg.basic),
# and opentelemetry (SelectableGroups dict interface).
filterwarnings =
    ignore::DeprecationWarning:mlflow.*
    ignore::DeprecationWarning:evidently.*
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:opentelemetry.*
    ignore::PendingDeprecationWarning:mlflow.*
    ignore:Pydantic V1 style.*:DeprecationWarning
    ignore:Please import.*scipy.*:DeprecationWarning
    ignore:Support for class-based.*:DeprecationWarning
    ignore:SelectableGroups dict.*:DeprecationWarning
    ignore::FutureWarning:evidently.*
    ignore::FutureWarning:mlflow.*
